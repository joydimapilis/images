<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recreated Illustration - img-5</title>
  <style>
    :root {
      --scale: 1;
      --bg: #f5f3ff;
      --ink: #100d39;
      --violet: #4636e8;
      --violet-2: #7564dd;
      --soft: #eeeaff;
      --line: #aaa4c9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #171713;
      font-family: Arial, Helvetica, sans-serif;
    }

    .viewport {
      width: min(100vw, calc(100vh * 3200 / 2261));
      aspect-ratio: 3200 / 2261;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    .stage {
      position: relative;
      width: 3200px;
      height: 2261px;
      transform: scale(var(--scale));
      transform-origin: top left;
    }

    svg { display: block; width: 3200px; height: 2261px; }

    .label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
    }

    .validate { top: 340px; color: #8f89ab; opacity: .74; font-size: 82px; }
    .transform { top: 448px; color: #70648f; font-size: 96px; }
    .detect { top: 614px; color: #17133d; font-size: 94px; }
  </style>
</head>
<body>
  <main class="viewport" aria-label="Detect transform validate rings around an isometric data tile">
    <div class="stage">
      <svg viewBox="0 0 3200 2261" role="img" aria-label="Pale purple security workflow rings with labels and a data panel">
        <defs>
          <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#6a5acb" flood-opacity=".18"/>
          </filter>
        </defs>

        <rect width="3200" height="2261" fill="#f6f4ff"/>
        <ellipse cx="1600" cy="1210" rx="1390" ry="780" fill="none" stroke="#a9a3c5" stroke-width="3" opacity=".62"/>
        <ellipse cx="1600" cy="1210" rx="1130" ry="620" fill="none" stroke="#6b5fd0" stroke-width="13" opacity=".95"/>
        <ellipse cx="1600" cy="1210" rx="900" ry="480" fill="none" stroke="#4738ee" stroke-width="18"/>
        <rect x="1482" y="1666" width="236" height="96" fill="#f6f4ff"/>
        <path d="M1484 1698 C1412 1691 1342 1675 1278 1652" fill="none" stroke="#f6f4ff" stroke-width="44" stroke-linecap="round"/>
        <path d="M1716 1698 C1788 1691 1858 1675 1922 1652" fill="none" stroke="#f6f4ff" stroke-width="44" stroke-linecap="round"/>

        <g transform="translate(970 930) scale(1.02 .62)" filter="url(#tileShadow)">
          <polygon points="640,0 1220,333 640,676 60,333" fill="#f7f4ff" stroke="#17133d" stroke-width="5"/>
          <polygon points="60,333 640,676 640,734 60,391" fill="#d5ccff" stroke="#17133d" stroke-width="5"/>
          <polygon points="640,676 1220,333 1220,391 640,734" fill="#c4b8fa" stroke="#17133d" stroke-width="5"/>
          <g opacity=".7" stroke="#b7add8" stroke-width="3" fill="none">
            <polygon points="210,300 390,196 530,277 350,381"/>
            <polygon points="428,424 608,320 748,401 568,505"/>
            <polygon points="654,292 834,188 974,269 794,373"/>
            <polygon points="876,416 1056,312 1160,372 980,476"/>
            <line x1="348" y1="300" x2="485" y2="221"/>
            <line x1="568" y1="424" x2="705" y2="345"/>
            <line x1="794" y1="292" x2="931" y2="213"/>
            <line x1="981" y1="416" x2="1108" y2="343"/>
          </g>
          <g stroke-linecap="round" stroke-width="24">
            <line x1="520" y1="246" x2="690" y2="148" stroke="#c6bffc"/>
            <line x1="598" y1="422" x2="830" y2="288" stroke="#4537e7"/>
            <line x1="813" y1="552" x2="1048" y2="416" stroke="#4537e7"/>
            <line x1="360" y1="500" x2="478" y2="432" stroke="#8b7feb"/>
            <line x1="310" y1="342" x2="406" y2="286" stroke="#d5d0fb"/>
            <line x1="944" y1="542" x2="1058" y2="477" stroke="#c7c0f7"/>
          </g>
        </g>

        <g transform="translate(1552 1602)" fill="#bfb4ff" stroke="#4936d9" stroke-width="5">
          <rect x="0" y="48" width="96" height="94" rx="8"/>
          <path d="M20 48 V25 C20 -7 76 -7 76 25 V48" fill="none"/>
        </g>
      </svg>
      <div class="label validate">Validate</div>
      <div class="label transform">Transform</div>
      <div class="label detect">Detect</div>
    </div>
  </main>
  <script>
    const viewport = document.querySelector(".viewport");
    function fitArtboard() {
      viewport.style.setProperty("--scale", Math.min(viewport.clientWidth / 3200, viewport.clientHeight / 2261));
    }
    addEventListener("resize", fitArtboard);
    fitArtboard();
  </script>
</body>
</html>
