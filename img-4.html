<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recreated Illustration - img-4</title>
  <style>
    :root {
      --scale: 1;
      --black: #010201;
      --cream: #fffbed;
      --edge: #c8c6b5;
      --dash: #f4f0d9;
      --purple: #8b20b5;
      --green: #0e9b60;
      --amber: #f5a900;
      --blue: #2364ad;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #171713;
    }

    .viewport {
      width: min(100vw, calc(100vh * 2512 / 1360));
      aspect-ratio: 2512 / 1360;
      position: relative;
      overflow: hidden;
      background: var(--black);
      border: 4px solid #bdb99d;
    }

    .stage {
      width: 2512px;
      height: 1360px;
      transform: scale(var(--scale));
      transform-origin: top left;
    }

    svg {
      display: block;
      width: 2512px;
      height: 1360px;
    }
  </style>
</head>
<body>
  <main class="viewport" aria-label="Isometric stacked security layers illustration">
    <div class="stage">
      <svg viewBox="0 0 2512 1360" role="img" aria-label="Four cream isometric layers on a black background with dashed guide lines and colored nodes">
        <defs>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".35"/>
          </filter>
          <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#fff9dd" flood-opacity=".7"/>
          </filter>
        </defs>

        <rect width="2512" height="1360" fill="#010201"/>

        <g stroke="#f4f0d9" stroke-width="6" stroke-dasharray="18 16" opacity=".92">
          <line x1="20" y1="699" x2="2492" y2="699"/>
          <line x1="20" y1="889" x2="2492" y2="889"/>
          <line x1="20" y1="1080" x2="2492" y2="1080"/>
          <line x1="20" y1="1271" x2="2492" y2="1271"/>
        </g>

        <g filter="url(#softShadow)">
          <polygon points="525,1273 1256,850 1987,1273 1660,1462 852,1462" fill="#fffbed" stroke="#c8c6b5" stroke-width="4"/>
          <polygon points="525,1082 1256,659 1987,1082 1256,1318" fill="#fffbed" stroke="#c8c6b5" stroke-width="4"/>
          <polygon points="525,891 1256,468 1987,891 1256,1127" fill="#fffbed" stroke="#c8c6b5" stroke-width="4"/>
          <polygon points="525,700 1256,274 1987,700 1256,1126" fill="#fffbed" stroke="#c8c6b5" stroke-width="4"/>
        </g>

        <g fill="#fffbed" filter="url(#innerGlow)">
          <g stroke="#8b20b5" stroke-width="4">
            <polygon points="525,688 542,699 525,710 508,699"/>
            <polygon points="1987,688 2004,699 1987,710 1970,699"/>
          </g>
          <g stroke="#0e9b60" stroke-width="4">
            <polygon points="525,879 542,890 525,901 508,890"/>
            <polygon points="1987,879 2004,890 1987,901 1970,890"/>
          </g>
          <g stroke="#f5a900" stroke-width="4">
            <polygon points="525,1070 542,1081 525,1092 508,1081"/>
            <polygon points="1987,1070 2004,1081 1987,1092 1970,1081"/>
          </g>
          <g stroke="#2364ad" stroke-width="4">
            <polygon points="525,1261 542,1272 525,1283 508,1272"/>
            <polygon points="1987,1261 2004,1272 1987,1283 1970,1272"/>
          </g>
        </g>

        <g transform="translate(1000 545)" opacity=".85">
          <path d="M92 62 L269 10 Q287 8 302 18 L456 111 Q478 125 488 149 Q505 192 492 238 L464 303 Q455 324 435 329 Q323 356 202 337 Q174 333 151 318 L13 232 Q2 225 10 213 L100 110 Q109 99 124 95 L223 66 Q242 61 256 72 L310 108" fill="#fff8d6" opacity=".25" stroke="#b9b7a5" stroke-width="4"/>
          <path d="M111 205 L156 179 L171 186 L241 145 Q288 123 334 143 L198 226 Z" fill="#000"/>
          <path d="M216 264 L352 182 Q384 196 375 225 Q373 235 361 244 L264 302 Z" fill="#000"/>
        </g>
      </svg>
    </div>
  </main>
  <script>
    const viewport = document.querySelector(".viewport");
    function fitArtboard() {
      viewport.style.setProperty("--scale", Math.min(viewport.clientWidth / 2512, viewport.clientHeight / 1360));
    }
    addEventListener("resize", fitArtboard);
    fitArtboard();
  </script>
</body>
</html>
