<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Models</title>
  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Page ───────────────────────────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #F2EBD9;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ─── Outer frame ────────────────────────────────── */
    .frame {
      position: relative;
      width: 780px;
      padding: 60px 0;
    }

    /* Corner anchor squares */
    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 2px;
    }
    .corner--tl { top: 36px;   left: -6px;  background: #E04040; }
    .corner--tr { top: 36px;   right: -6px; background: #E87A20; }
    .corner--bl { bottom: 36px; left: -6px; background: #6B2DB8; }
    .corner--br { bottom: 36px; right: -6px;background: #D49020; }

    /* ─── Stack of cards ─────────────────────────────── */
    .stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Base card ───────────────────────────────────── */
    .card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: 6px;
      padding: 28px 40px;
      border: 1.5px solid #DDD5C0;
      background: #F5EFE2;
    }

    /* Middle card — slightly larger + filled */
    .card--featured {
      background: #EDE4CC;
      border-color: #D8CDB4;
      padding: 36px 40px;
    }

    /* ─── Icon wrapper ────────────────────────────────── */
    .card__icon {
      flex-shrink: 0;
      color: #5A5347;
    }
    .card__icon svg {
      display: block;
      width: 28px;
      height: 28px;
    }
    .card--featured .card__icon svg {
      width: 32px;
      height: 32px;
    }

    /* ─── Label ───────────────────────────────────────── */
    .card__label {
      font-size: 22px;
      font-weight: 600;
      color: #4A4440;
      letter-spacing: -0.01em;
    }
    .card--featured .card__label {
      font-size: 26px;
    }
  </style>
</head>
<body>

  <div class="frame">
    <!-- Corner anchors -->
    <span class="corner corner--tl"></span>
    <span class="corner corner--tr"></span>
    <span class="corner corner--bl"></span>
    <span class="corner corner--br"></span>

    <div class="stack">

      <!-- Transcription -->
      <div class="card">
        <span class="card__icon">
          <!-- Document / clipboard icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="2" width="12" height="16" rx="2"/>
            <rect x="4" y="6" width="12" height="16" rx="2" fill="#EDE4CC" stroke="currentColor"/>
            <line x1="8"  y1="11" x2="13" y2="11"/>
            <line x1="8"  y1="14" x2="13" y2="14"/>
            <line x1="8"  y1="17" x2="11" y2="17"/>
          </svg>
        </span>
        <span class="card__label">Transcription</span>
      </div>

      <!-- Large language model (featured) -->
      <div class="card card--featured">
        <span class="card__icon">
          <!-- Brain icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 2C7 2 5 4 5 6.5c0 .5.1 1 .2 1.4C3.9 8.5 3 9.9 3 11.5
                     c0 1.8 1.1 3.3 2.7 3.9C5.9 18.4 7.5 20 9.5 20c.8 0 1.5-.2 2.1-.6
                     .5.4 1.2.6 1.9.6 2 0 3.6-1.6 3.8-4.6
                     C18.9 14.8 20 13.3 20 11.5c0-1.6-.9-3-2.2-3.6
                     .2-.4.2-.9.2-1.4C18 4 16 2 13.5 2c-.9 0-1.8.3-2.5.8
                     C10.4 2.3 9.9 2 9.5 2z"/>
            <path d="M12 6v12M9 9c0 0 1.5 1.5 3 1.5S15 9 15 9
                     M9 14c0 0 1.5-1 3-1s3 1 3 1"/>
          </svg>
        </span>
        <span class="card__label">Large language model</span>
      </div>

      <!-- Text-to-speech -->
      <div class="card">
        <span class="card__icon">
          <!-- Microphone icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="9"  y1="22" x2="15" y2="22"/>
          </svg>
        </span>
        <span class="card__label">Text-to-speech</span>
      </div>

    </div>
  </div>

  <!--
  ═══════════════════════════════════════════════════════════════════
  REVERSE-ENGINEERED DESIGN PROMPT
  ═══════════════════════════════════════════════════════════════════

  Create a minimal, flat UI panel on a warm cream background that
  displays three vertically-stacked AI model-type selector cards.

  ── Canvas & Frame ──────────────────────────────────────────────
  • Background color: #F2EBD9 (warm parchment / off-white cream)
  • The entire composition sits inside an invisible bounding box
    ~780 px wide. At each corner of this bounding box place a small
    filled square (14 × 14 px, border-radius 2 px) as anchor/corner
    markers:
      top-left     → #E04040  (coral red)
      top-right    → #E87A20  (burnt orange)
      bottom-left  → #6B2DB8  (violet / purple)
      bottom-right → #D49020  (amber / gold)

  ── Card Stack ──────────────────────────────────────────────────
  Three horizontally-wide cards stacked with 20 px vertical gap.
  All cards share:
    • Border-radius: 6 px
    • Border: 1.5 px solid #DDD5C0
    • Background: #F5EFE2 (very light warm beige)
    • Content: centered icon + label side-by-side, icon 14 px to
      the left of text
    • Icon color: #5A5347 (warm dark gray)
    • Label color: #4A4440 (deep warm gray)
    • Font: Inter (or system sans-serif), semi-bold (600)

  Card 1 — "Transcription"
    • Padding: 28 px top/bottom, 40 px left/right
    • Icon: double-document / clipboard (outline stroke 1.7)
    • Label: 22 px / 600 weight

  Card 2 — "Large language model"  [FEATURED / middle]
    • Padding: 36 px top/bottom, 40 px left/right  (taller than others)
    • Background: #EDE4CC  (slightly darker warm beige — stands out)
    • Border: 1.5 px solid #D8CDB4
    • Icon: brain / neural outline (outline stroke 1.7), 32 px
    • Label: 26 px / 600 weight  (slightly larger text)

  Card 3 — "Text-to-speech"
    • Same spec as Card 1
    • Icon: microphone outline (outline stroke 1.7)
    • Label: 22 px / 600 weight

  ── Typography ──────────────────────────────────────────────────
  Font family: Inter, Helvetica Neue, Arial, sans-serif
  Weights used: 600 (semi-bold) only
  Letter-spacing: -0.01 em for a tight, modern feel
  No subtext, captions, or secondary labels anywhere.

  ── Visual Style ────────────────────────────────────────────────
  Flat design — no drop shadows, no gradients, no blur effects.
  Warm neutral monochromatic palette with tiny accent corner dots.
  The overall feel is an infographic-style "model type" picker,
  clean and minimal, suitable for a SaaS product marketing section.

  ── Interactions (optional) ─────────────────────────────────────
  On card hover: lighten border to #C8BFA8, raise background to
  #EAE0CE. Transition: 150 ms ease. No scale or shadow transforms.
  ═══════════════════════════════════════════════════════════════════
  -->

</body>
</html>
